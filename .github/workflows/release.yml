name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Update version in files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/\"version\": \"[0-9.]*\"/\"version\": \"$VERSION\"/" manifest.json
          sed -i "s/version='[0-9.]*'/version='$VERSION'/" updates.xml
          sed -i "s/v[0-9.]* •/v$VERSION •/g" index.html
          echo "Version updated to $VERSION"
      
      - name: Create dist
        run: |
          mkdir -p dist/seo-toolkit
          
          cp -r popup dist/seo-toolkit/
          cp -r background dist/seo-toolkit/
          cp -r utils dist/seo-toolkit/
          cp -r lib dist/seo-toolkit/
          cp -r img dist/seo-toolkit/ 2>/dev/null || echo "No img"
          cp -r content dist/seo-toolkit/ 2>/dev/null || echo "No content"
          cp -r icons dist/seo-toolkit/ 2>/dev/null || echo "No icons"
          cp manifest.json dist/seo-toolkit/
          
          find dist/seo-toolkit -name ".DS_Store" -delete
          find dist/seo-toolkit -name "Thumbs.db" -delete
          
          cd dist/seo-toolkit
          zip -r ../seo-toolkit.zip . -q
          cd ../..
          
          echo "=== dist contents ==="
          ls -la dist/
          echo "=== IMG check ==="
          ls -la dist/seo-toolkit/img/ 2>/dev/null || echo "NO IMG"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SEO Toolkit v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🚀 SEO Toolkit v${{ steps.version.outputs.VERSION }}
            
            ### 📦 Установка
            
            **🌐 Сайт:** [instrumenty-marketologa.ru](https://instrumenty-marketologa.ru)
            
            **💻 Windows:** Скачайте `install.bat` → запустите → расширение на рабочем столе
            
            **📦 Вручную:** Скачайте `seo-toolkit.zip` → распакуйте → `chrome://extensions/` → «Загрузить распакованное»
            
            ---
            🔄 Автообновление включено
          files: |
            dist/seo-toolkit.zip
            dist/install.bat
          draft: false
          prerelease: false
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false