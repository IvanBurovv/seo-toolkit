name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Update version in files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/\"version\": \"[0-9.]*\"/\"version\": \"$VERSION\"/" manifest.json
          sed -i "s/version='[0-9.]*'/version='$VERSION'/" updates.xml
          
          # Обновляем версию в index.html
          sed -i "s/v[0-9.]* \•/v$VERSION \•/g" index.html
          
          # Обновляем версию в install.bat
          sed -i "s/\"version\" \".*\"/\"version\" \"$VERSION\"/" install.bat
          
          echo "✅ Updated to version $VERSION"
      
      - name: Create dist
        run: |
          mkdir -p dist/seo-toolkit
          
          cp -r popup dist/seo-toolkit/
          cp -r background dist/seo-toolkit/
          cp -r utils dist/seo-toolkit/
          cp -r lib dist/seo-toolkit/
          cp -r icons dist/seo-toolkit/ 2>/dev/null || echo "No icons"
          cp -r content dist/seo-toolkit/ 2>/dev/null || echo "No content"
          cp manifest.json dist/seo-toolkit/
          cp updates.xml dist/seo-toolkit/
          
          find dist/seo-toolkit -name ".DS_Store" -delete
          find dist/seo-toolkit -name "Thumbs.db" -delete
          
          # ZIP
          cd dist/seo-toolkit
          zip -r ../seo-toolkit.zip . -q
          cd ../..
          
          # CRX = ZIP (Chrome примет)
          cp dist/seo-toolkit.zip dist/seo-toolkit.crx
          
          # Копируем install.bat
          cp install.bat dist/
          
          # Копируем index.html
          cp index.html dist/
          
          echo "Files:"
          ls -la dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SEO Toolkit v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🚀 SEO Toolkit v${{ steps.version.outputs.VERSION }}
            
            ### 📦 Установка (1 клик)
            
            **🌐 Скачать с сайта:** [seo-toolkit.ru](https://seo-toolkit.ru)
            
            **💻 Windows:** Скачайте `install.bat` и запустите — расширение установится автоматически.
            
            **📦 Вручную:**
            - `seo-toolkit.crx` — перетащите в chrome://extensions/
            - `seo-toolkit.zip` — распакуйте и загрузите в режиме разработчика
            
            ---
            🔄 Автообновление включено (только для CRX-установки)
          files: |
            dist/seo-toolkit.crx
            dist/seo-toolkit.zip
            dist/install.bat
            dist/index.html
          draft: false
          prerelease: false
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false